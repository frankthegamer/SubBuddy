<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubBuddy — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/shared.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem; box-shadow: var(--shadow-md);
    }
    .login-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 2rem;
    }
    .login-logo-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .login-logo-text { font-size: 20px; font-weight: 500; letter-spacing: -.3px; }
    .login-switcher {
      display: flex; background: var(--surface-2);
      border-radius: var(--radius-sm); padding: 3px; margin-bottom: 1.75rem;
      gap: 3px;
    }
    .login-tab {
      flex: 1; text-align: center; padding: 8px;
      border-radius: 5px; font-size: 14px; cursor: pointer;
      font-family: inherit; border: none; background: none;
      color: var(--text-2); transition: all .15s;
    }
    .login-tab.active { background: var(--surface); color: var(--text); font-weight: 500; box-shadow: var(--shadow); }
    .login-footer { text-align: center; margin-top: 1.25rem; font-size: 13px; color: var(--text-3); }
    .login-footer a { color: var(--accent); text-decoration: none; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .btn-full { width: 100%; justify-content: center; margin-top: .25rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="10" height="16" viewBox="0 0 14 29" fill="none">
          <path d="M12.4704 5.94027C1.99477 5.27765 -2.66183 14.006 5.1781 14.5015C13.0182 14.997 18.1901 22.9896 1.35094 23.245M8.09303 27.4864L5.6903 1.25024" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="login-logo-text">SubBuddy</span>
    </div>


<!-- Login/Register Form Selection -->
  <div class="login-switcher">
    <button class="login-tab active" onclick="showPanel('signin')">Sign in</button>
    <button class="login-tab" onclick="showPanel('register')">Register</button>
  </div>

    <!-- Sign in -->
    <div id="panel-signin" class="form-panel active">
      <div class="form-group">
        <label class="form-label" for="si-email">Email address</label>
        <input type="email" id="si-email" class="form-input" >
      </div>
      <div class="form-group">
        <label class="form-label" for="si-pass">Password</label>
        <input type="password" id="si-pass" class="form-input" >
      </div>

      <button class="btn btn-primary btn-full" onclick="signIn()">Sign in</button>
    </div>

    <!-- Register -->
    <div id="panel-register" class="form-panel">
      <div class="form-row cols-2">
        
        <div class="form-group">
          <label class="form-label" for="r-fname">First name <span class="required">*</span></label>
          <input type="text" id="r-fname" class="form-input" placeholder="John">
        </div>

        <div class="form-group">
          <label class="form-label" for="r-lname">Last name <span class="required">*</span></label>
          <input type="text" id="r-lname" class="form-input" placeholder="Smith">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="r-email">Email address <span class="required">*</span></label>
        <input type="email" id="r-email" class="form-input" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="form-label" for="r-phone">Phone number</label>
        <input type="tel" id="r-phone" class="form-input" placeholder="+1 (555) 000-0000">
        <div class="form-hint">Optional — used for admin lookup</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="r-pass">Password <span class="required">*</span></label>
        <input type="password" id="r-pass" class="form-input">
      </div>
      <button class="btn btn-primary btn-full" onclick="register()">Create account</button>
  </div>

  
   <script src="/static/js/login.js"></script>
  
</body>
</html>
